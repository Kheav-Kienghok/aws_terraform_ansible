- name: Configure EC2 with Nginx
  hosts: web
  become: yes

  tasks:
    - name: Wait for cloud-init to finish
      shell: cloud-init status --wait
      changed_when: false

    - name: Install nginx
      package:
        name: nginx
        state: present

    - name: Enable and start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Deploy homepage
      copy:
        dest: /usr/share/nginx/html/index.html
        content: |
          <h1>Terraform + Ansible Deployment Worked 🚀</h1>
          <p>This EC2 instance was provisioned by Terraform and configured by Ansible.</p>
