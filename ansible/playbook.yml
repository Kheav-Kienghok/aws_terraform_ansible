- name: Configure EC2 with Nginx
  hosts: web
  become: yes

  tasks:
    - name: Update apt
      apt:
        update_cache: yes

    - name: Install nginx
      apt:
        name: nginx
        state: present

    - name: Enable + start nginx
      service:
        name: nginx
        state: started
        enabled: yes

    - name: Write custom homepage
      copy:
        dest: /var/www/html/index.html
        content: |
          <h1>Terraform + Ansible Deployment Worked 🚀</h1>
          <p>This EC2 was provisioned by Terraform and configured by Ansible.</p>
